<header [class.scrolled]="isScrolled">
  <nav class="nav-container">
    <div class="logo">
      <span class="gradient-text">PRIYANSHU.</span>
    </div>

    <!-- Desktop Menu -->
    <ul class="nav-links">
      <li><a href="#home">Home</a></li>
      <li><a href="#about">About</a></li>
      <li><a href="#projects">Projects</a></li>
      <li><a href="#experience">Experience</a></li>
      <li><a href="#contact" class="nav-cta">Hire Me</a></li>
    </ul>

    <!-- Hamburger Icon -->
    <button class="mobile-menu-btn" (click)="toggleMenu()" [class.active]="isMenuOpen">
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
    </button>
  </nav>

  <!-- Mobile Sidebar Overlay -->
  <div class="mobile-overlay" [class.active]="isMenuOpen" (click)="closeMenu()">
    <div class="mobile-sidebar glass-card" (click)="$event.stopPropagation()">
      <div class="sidebar-header">
        <span class="gradient-text">MENU</span>
        <button class="close-sidebar" (click)="closeMenu()">&times;</button>
      </div>
      
      <ul class="mobile-nav-links">
        <li><a href="#home" (click)="closeMenu()">Home</a></li>
        <li><a href="#about" (click)="closeMenu()">About</a></li>
        <li><a href="#projects" (click)="closeMenu()">Projects</a></li>
        <li><a href="#experience" (click)="closeMenu()">Experience</a></li>
        <li><a href="#contact" class="btn-primary" (click)="closeMenu()">Hire Me</a></li>
      </ul>

      <div class="sidebar-footer">
        <p>Let's build something exceptional.</p>
      </div>
    </div>
  </div>
</header>
